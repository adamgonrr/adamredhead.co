<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Adam Redhead</title>
  <meta name="description" content="Adam Redhead — operator, builder. Something is coming.">
  <style>
    :root {
      --bg: #101214;
      --ink: #ece7df;
      --muted: #8a857c;
      --rule: #2c2f33;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #faf8f4;
        --ink: #1c1e20;
        --muted: #77726a;
        --rule: #ddd8cf;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    main { max-width: 34rem; }
    h1 {
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .rule {
      width: 3.5rem;
      height: 1px;
      background: var(--rule);
      margin: 1.75rem auto;
    }
    p {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Adam Redhead</h1>
    <div class="rule"></div>
    <p>Coming Soon</p>
  </main>
</body>
</html>
